<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Go Under the Hood — Visual Learning</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --sidebar-bg: #161b22;
      --card-bg: #1c2128;
      --border: #30363d;
      --go-blue: #00ADD8;
      --go-blue-dim: rgba(0,173,216,0.12);
      --go-blue-mid: rgba(0,173,216,0.3);
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --purple: #d2a8ff;
      --orange: #ffa657;
      --kw: #ff7b72;
      --str: #a5d6ff;
      --fn: #d2a8ff;
      --num: #79c0ff;
      --sidebar-w: 268px;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }

    #app { display: flex; height: 100vh; }

    /* ── Sidebar ── */
    .sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }

    .sidebar-header { padding: 18px 16px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }

    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .logo-icon { font-size: 22px; }
    .logo-title { font-size: 13px; font-weight: 700; color: var(--go-blue); letter-spacing: .3px; }
    .logo-sub { font-size: 11px; color: var(--muted); }

    .progress-wrap { display: flex; align-items: center; gap: 8px; }
    .progress-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--go-blue); border-radius: 2px; transition: width .4s ease; }
    .progress-text { font-size: 11px; color: var(--muted); white-space: nowrap; }

    .chapter-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .chapter-list::-webkit-scrollbar { width: 4px; }
    .chapter-list::-webkit-scrollbar-track { background: transparent; }
    .chapter-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .section-label { padding: 10px 16px 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); }

    .ch-item { display: flex; align-items: center; gap: 10px; padding: 7px 16px; cursor: pointer; border-left: 2px solid transparent; transition: all .15s; }
    .ch-item:hover { background: rgba(255,255,255,.04); }
    .ch-item.active { background: var(--go-blue-dim); border-left-color: var(--go-blue); }
    .ch-item.active .ch-title { color: var(--go-blue); }
    .ch-item.done .ch-num { background: var(--green); color: #000; }
    .ch-item.locked { opacity: .45; pointer-events: none; }

    .ch-num { width: 20px; height: 20px; border-radius: 50%; background: var(--border); color: var(--muted); font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .2s; }
    .ch-item.active .ch-num { background: var(--go-blue); color: #000; }
    .ch-meta { flex: 1; min-width: 0; }
    .ch-title { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ch-tag { font-size: 10px; color: var(--muted); margin-top: 1px; }

    /* ── Main ── */
    .main { flex: 1; overflow-y: auto; background: var(--bg); }
    .main::-webkit-scrollbar { width: 6px; }
    .main::-webkit-scrollbar-track { background: transparent; }
    .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .chapter-view { max-width: 900px; margin: 0 auto; padding: 36px 40px 60px; }

    /* Chapter header */
    .ch-header { margin-bottom: 28px; }
    .ch-header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .ch-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--go-blue-dim); color: var(--go-blue); border: 1px solid var(--go-blue-mid); font-weight: 600; }
    .ch-number { font-size: 11px; color: var(--muted); }
    .ch-header h1 { font-size: 26px; font-weight: 800; color: var(--text); line-height: 1.2; margin-bottom: 8px; }
    .ch-header .subtitle { font-size: 15px; color: var(--muted); line-height: 1.6; }

    /* Concept pills */
    .concepts { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; }
    .concept { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: var(--card-bg); border: 1px solid var(--border); color: var(--muted); font-family: 'SF Mono', 'Cascadia Code', monospace; }

    /* Content grid */
    .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    @media (max-width: 700px) { .content-grid { grid-template-columns: 1fr; } }

    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
    .card-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .card-label::before { content: ''; width: 3px; height: 12px; background: var(--go-blue); border-radius: 2px; }
    .card p { font-size: 13px; color: var(--muted); line-height: 1.7; }
    .card p + p { margin-top: 8px; }

    /* Code block */
    .code-wrap { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
    .code-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,.02); }
    .code-lang { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
    .copy-btn { font-size: 11px; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 5px; padding: 3px 8px; cursor: pointer; transition: all .15s; }
    .copy-btn:hover { color: var(--text); border-color: var(--go-blue); }
    pre { padding: 16px; overflow-x: auto; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 12.5px; line-height: 1.65; }
    pre::-webkit-scrollbar { height: 4px; }
    pre::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .kw { color: var(--kw); } .str { color: var(--str); } .fn { color: var(--fn); }
    .num { color: var(--num); } .cm { color: var(--muted); font-style: italic; }
    .type { color: var(--orange); } .pkg { color: var(--green); }

    /* Viz card */
    .viz-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
    .viz-header { padding: 12px 18px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,.02); display: flex; align-items: center; justify-content: space-between; }
    .viz-title { font-size: 12px; font-weight: 700; color: var(--text); }
    .viz-body { padding: 20px; min-height: 200px; }

    /* Navigation */
    .ch-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
    .nav-btn { display: flex; align-items: center; gap: 6px; padding: 9px 16px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; font-size: 13px; transition: all .15s; }
    .nav-btn:hover { border-color: var(--go-blue); color: var(--go-blue); }
    .nav-btn:disabled { opacity: .35; pointer-events: none; }
    .nav-center { font-size: 12px; color: var(--muted); }

    /* Coming soon */
    .coming-soon { text-align: center; padding: 60px 20px; }
    .coming-soon .cs-icon { font-size: 48px; margin-bottom: 16px; }
    .coming-soon h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
    .coming-soon p { color: var(--muted); font-size: 13px; }

    /* ── Viz-specific styles ── */

    /* Ch1: Boot sequence */
    .boot-steps { display: flex; flex-direction: column; gap: 0; }
    .boot-step { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; opacity: .25; transition: opacity .4s, transform .4s; transform: translateX(-8px); }
    .boot-step.active { opacity: 1; transform: translateX(0); }
    .boot-step.done { opacity: .6; transform: translateX(0); }
    .step-dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; background: var(--bg); transition: all .4s; color: var(--muted); }
    .boot-step.active .step-dot { border-color: var(--go-blue); color: var(--go-blue); background: var(--go-blue-dim); }
    .boot-step.done .step-dot { border-color: var(--green); color: var(--green); background: rgba(63,185,80,.1); }
    .step-connector { width: 2px; height: 20px; background: var(--border); margin: 0 13px; }
    .step-content { flex: 1; padding-top: 4px; }
    .step-name { font-size: 12px; font-weight: 700; color: var(--text); font-family: monospace; }
    .step-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .viz-btn { padding: 8px 16px; background: var(--go-blue); color: #000; border: none; border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; transition: opacity .2s; }
    .viz-btn:hover { opacity: .85; }
    .viz-btn:disabled { opacity: .4; cursor: default; }
    .viz-btn.secondary { background: var(--card-bg); color: var(--text); border: 1px solid var(--border); }
    .viz-controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }

    /* Ch2: Goroutines */
    .thread-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .thread-side { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
    .thread-side h4 { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
    .thread-side.goroutine h4 { color: var(--go-blue); }
    .thread-side.osthread h4 { color: var(--orange); }
    .thread-mem { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
    .mem-bar-wrap { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
    .mem-bar { height: 100%; border-radius: 4px; transition: width .4s ease; }
    .goroutine .mem-bar { background: var(--go-blue); }
    .osthread .mem-bar { background: var(--orange); }
    .stack-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(28px, 1fr)); gap: 3px; margin-top: 8px; max-height: 120px; overflow: hidden; }
    .stack-box { height: 24px; border-radius: 3px; font-size: 9px; display: flex; align-items: center; justify-content: center; font-weight: 700; transition: all .3s; }
    .goroutine .stack-box { background: var(--go-blue-dim); border: 1px solid var(--go-blue-mid); color: var(--go-blue); }
    .osthread .stack-box { background: rgba(255,166,87,.1); border: 1px solid rgba(255,166,87,.3); color: var(--orange); }
    .thread-stats { font-size: 11px; color: var(--muted); margin-top: 8px; }
    .thread-stats span { color: var(--text); font-weight: 700; }

    /* Ch3: GMP */
    .gmp-wrap { position: relative; }
    .gmp-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
    .gmp-label { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; width: 36px; flex-shrink: 0; padding-top: 8px; }
    .gmp-boxes { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
    .grq-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; display: flex; gap: 6px; flex-wrap: wrap; min-height: 40px; flex: 1; align-items: center; }
    .p-box { background: var(--bg); border: 1px solid var(--go-blue-mid); border-radius: 8px; padding: 8px 10px; min-width: 100px; }
    .p-box-title { font-size: 10px; font-weight: 700; color: var(--go-blue); margin-bottom: 6px; }
    .p-running { min-height: 28px; background: var(--go-blue-dim); border-radius: 5px; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--go-blue); font-weight: 700; }
    .p-queue { display: flex; gap: 3px; flex-wrap: wrap; min-height: 20px; }
    .m-box { background: var(--bg); border: 1px solid rgba(255,166,87,.4); border-radius: 8px; padding: 6px 12px; font-size: 11px; font-weight: 700; color: var(--orange); min-width: 60px; text-align: center; }
    .g-pill { padding: 3px 8px; border-radius: 12px; font-size: 10px; font-weight: 700; display: inline-flex; align-items: center; gap: 4px; transition: all .3s; }
    .g-pill.run { background: var(--go-blue-dim); border: 1px solid var(--go-blue-mid); color: var(--go-blue); }
    .g-pill.blocked { background: rgba(248,81,73,.1); border: 1px solid rgba(248,81,73,.3); color: var(--red); }
    .g-pill.waiting { background: var(--card-bg); border: 1px solid var(--border); color: var(--muted); }
    .gmp-log { font-family: monospace; font-size: 11px; color: var(--muted); background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; margin-top: 10px; min-height: 40px; max-height: 80px; overflow-y: auto; }
    .gmp-log div { line-height: 1.6; }
    .gmp-log .log-time { color: var(--go-blue); }

    /* Ch4: Channels */
    .chan-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .chan-actors { display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 8px; }
    .goroutine-box { background: var(--bg); border: 2px solid var(--border); border-radius: 10px; padding: 10px 14px; text-align: center; min-width: 80px; transition: all .3s; }
    .goroutine-box.running { border-color: var(--go-blue); }
    .goroutine-box.blocked { border-color: var(--red); background: rgba(248,81,73,.05); }
    .goroutine-box .gb-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
    .goroutine-box .gb-status { font-size: 11px; font-weight: 700; }
    .goroutine-box.running .gb-status { color: var(--go-blue); }
    .goroutine-box.blocked .gb-status { color: var(--red); }
    .chan-pipe { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px; }
    .chan-slots { display: flex; gap: 4px; justify-content: center; min-height: 36px; align-items: center; }
    .chan-slot { width: 36px; height: 32px; border-radius: 5px; border: 1px dashed var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; transition: all .3s; }
    .chan-slot.filled { background: var(--go-blue-dim); border-color: var(--go-blue); color: var(--go-blue); border-style: solid; }
    .chan-info { text-align: center; font-size: 10px; color: var(--muted); margin-top: 6px; }
    .chan-type-toggle { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .chan-type-toggle button { padding: 5px 12px; background: none; border: none; font-size: 11px; color: var(--muted); cursor: pointer; transition: all .2s; }
    .chan-type-toggle button.active { background: var(--go-blue-dim); color: var(--go-blue); }
    .chan-message { font-size: 11px; color: var(--muted); text-align: center; min-height: 18px; margin-top: 4px; }

    /* Ch5: Memory Allocator */
    .mem-alloc { display: flex; flex-direction: column; gap: 8px; }
    .alloc-tier { border-radius: 8px; padding: 10px 14px; border: 1px solid var(--border); transition: all .4s; }
    .alloc-tier.mcache { background: rgba(0,173,216,.06); border-color: var(--go-blue-mid); }
    .alloc-tier.mcentral { background: rgba(210,168,255,.06); border-color: rgba(210,168,255,.2); }
    .alloc-tier.mheap { background: rgba(255,166,87,.06); border-color: rgba(255,166,87,.2); }
    .alloc-tier.highlight { transform: scale(1.02); box-shadow: 0 0 0 2px; }
    .alloc-tier.mcache.highlight { box-shadow: 0 0 0 2px var(--go-blue); }
    .alloc-tier.mcentral.highlight { box-shadow: 0 0 0 2px var(--purple); }
    .alloc-tier.mheap.highlight { box-shadow: 0 0 0 2px var(--orange); }
    .tier-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .tier-name { font-size: 12px; font-weight: 700; }
    .mcache .tier-name { color: var(--go-blue); }
    .mcentral .tier-name { color: var(--purple); }
    .mheap .tier-name { color: var(--orange); }
    .tier-desc { font-size: 10px; color: var(--muted); }
    .tier-slots { display: flex; gap: 3px; flex-wrap: wrap; }
    .tier-slot { width: 14px; height: 14px; border-radius: 2px; border: 1px solid; transition: all .3s; }
    .mcache .tier-slot { border-color: var(--go-blue-mid); background: var(--bg); }
    .mcache .tier-slot.used { background: var(--go-blue); }
    .mcentral .tier-slot { border-color: rgba(210,168,255,.2); background: var(--bg); }
    .mcentral .tier-slot.used { background: var(--purple); }
    .mheap .tier-slot { border-color: rgba(255,166,87,.2); background: var(--bg); }
    .mheap .tier-slot.used { background: var(--orange); }
    .alloc-arrow { text-align: center; font-size: 16px; color: var(--muted); line-height: 1; }
    .alloc-status { font-size: 11px; color: var(--muted); text-align: center; margin-top: 10px; min-height: 18px; }
    .size-btns { display: flex; gap: 4px; flex-wrap: wrap; }
    .size-btn { padding: 4px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; font-size: 11px; color: var(--muted); cursor: pointer; transition: all .2s; }
    .size-btn:hover, .size-btn.active { border-color: var(--go-blue); color: var(--go-blue); background: var(--go-blue-dim); }
  </style>
</head>
<body>
<div id="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <div>
          <div class="logo-title">Go Under the Hood</div>
          <div class="logo-sub">Visual Learning · 20 Chapters</div>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
        <div class="progress-text" id="progress-text">0 / 20</div>
      </div>
    </div>
    <nav class="chapter-list" id="chapter-list"></nav>
  </aside>
  <main class="main" id="main"></main>
</div>

<script>
// ─────────────────────────────────────────────
//  Helpers
// ─────────────────────────────────────────────
let currentCleanup = null;
let visited = new Set();

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyCode(btn) {
  const pre = btn.closest('.code-wrap').querySelector('pre');
  navigator.clipboard.writeText(pre.innerText).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1600);
  });
}

// ─────────────────────────────────────────────
//  Chapter data
// ─────────────────────────────────────────────
const CHAPTERS = [
  // ── 1 ──────────────────────────────────────
  {
    id: 1,
    title: 'The Go Runtime Boot',
    subtitle: 'What really happens before main() executes',
    tag: 'Runtime',
    concepts: ['rt0_go', 'schedinit', 'runtime.main', 'GOMAXPROCS', 'g0 stack'],
    body: [
      {
        label: 'What is the Go runtime?',
        text: `Every Go binary embeds a small runtime — roughly 300 KB of Go and assembly code that bootstraps the world before your main() ever runs. It's not an OS-level VM; it's compiled directly into your binary.`
      },
      {
        label: 'Why does it exist?',
        text: `The runtime owns memory allocation (no malloc), goroutine scheduling (no OS threads per goroutine), the garbage collector, and the channel/select machinery. None of these exist in the OS; the runtime provides them all.`
      }
    ],
    code: `<span class="cm">// Simplified boot sequence (pseudo-code)</span>
<span class="cm">// Entry point: _rt0_amd64_linux (assembly)</span>
<span class="fn">runtime</span>·<span class="fn">rt0_go</span>():
    <span class="cm">// 1. Set up g0 — the scheduler's own goroutine</span>
    g0.stack = <span class="pkg">os</span>.<span class="fn">allocStack</span>(<span class="num">8192</span>)

    <span class="cm">// 2. Initialise the runtime</span>
    <span class="fn">runtime.schedinit</span>()
    <span class="cm">//    └─ mallocinit()   — heap allocator</span>
    <span class="cm">//    └─ gcinit()        — garbage collector</span>
    <span class="cm">//    └─ procresize()    — create GOMAXPROCS P's</span>

    <span class="cm">// 3. Create the main goroutine</span>
    <span class="fn">runtime.newproc</span>(runtime.main)

    <span class="cm">// 4. Start the OS-thread loop — never returns</span>
    <span class="fn">runtime.mstart</span>()

<span class="kw">func</span> <span class="fn">runtime.main</span>() {
    <span class="fn">main.init</span>()  <span class="cm">// all package init() calls</span>
    <span class="fn">main.main</span>() <span class="cm">// your code starts here</span>
}`,
    vizTitle: 'Interactive Boot Sequence',
    vizHTML: () => `
      <div class="viz-controls">
        <button class="viz-btn" id="boot-run">▶ Run Boot</button>
        <button class="viz-btn secondary" id="boot-reset">↺ Reset</button>
      </div>
      <div class="boot-steps" id="boot-steps"></div>`,
    vizInit: () => {
      const steps = [
        { name: '_rt0_amd64 / rt0_go', desc: 'CPU jumps to the binary entry point (assembly stub)', symbol: '①' },
        { name: 'g0 stack allocated', desc: 'Scheduler goroutine g0 gets an 8 KB stack — not a regular goroutine', symbol: '②' },
        { name: 'runtime.schedinit()', desc: 'Heap allocator, GC, and GOMAXPROCS Ps are initialised', symbol: '③' },
        { name: 'mallocinit()', desc: 'mheap, mcentral and per-P mcache structures created', symbol: '④' },
        { name: 'gcinit()', desc: 'GC write-barrier and mark state initialised', symbol: '⑤' },
        { name: 'procresize(GOMAXPROCS)', desc: 'One P per logical CPU is created and linked to g0', symbol: '⑥' },
        { name: 'runtime.newproc(main)', desc: 'The main goroutine (G1) is created and placed in the run queue', symbol: '⑦' },
        { name: 'runtime.mstart()', desc: 'OS thread enters the scheduler loop, picks up G1', symbol: '⑧' },
        { name: 'main.init()', desc: 'All package-level init() functions run in dependency order', symbol: '⑨' },
        { name: 'main.main() ✓', desc: 'Your program starts', symbol: '⑩' },
      ];

      const container = document.getElementById('boot-steps');
      container.innerHTML = steps.map((s, i) => `
        <div>
          <div class="boot-step" id="bs-${i}">
            <div class="step-dot">${s.symbol}</div>
            <div class="step-content">
              <div class="step-name">${esc(s.name)}</div>
              <div class="step-desc">${esc(s.desc)}</div>
            </div>
          </div>
          ${i < steps.length - 1 ? '<div class="step-connector"></div>' : ''}
        </div>`).join('');

      let timer = null, idx = 0;
      const runBtn = document.getElementById('boot-run');
      const resetBtn = document.getElementById('boot-reset');

      function activate(i) {
        for (let k = 0; k < steps.length; k++) {
          const el = document.getElementById(`bs-${k}`);
          el.classList.remove('active', 'done');
          if (k < i) el.classList.add('done');
          if (k === i) el.classList.add('active');
        }
      }

      runBtn.addEventListener('click', () => {
        if (timer) return;
        runBtn.disabled = true;
        timer = setInterval(() => {
          activate(idx);
          idx++;
          if (idx >= steps.length) {
            clearInterval(timer); timer = null;
            // mark all done
            steps.forEach((_, k) => document.getElementById(`bs-${k}`).classList.replace('active','done'));
          }
        }, 450);
      });

      resetBtn.addEventListener('click', () => {
        if (timer) { clearInterval(timer); timer = null; }
        idx = 0; runBtn.disabled = false;
        steps.forEach((_, k) => {
          const el = document.getElementById(`bs-${k}`);
          el.classList.remove('active', 'done');
        });
      });

      return () => { if (timer) clearInterval(timer); };
    }

  {
    id: 3,
    title: 'The GMP Scheduler',
    subtitle: 'How Go multiplexes goroutines onto OS threads',
    tag: 'Runtime',
    concepts: ['G (goroutine)', 'M (OS thread)', 'P (processor)', 'work stealing', 'global run queue'],
    body: [
      {
        label: 'Three actors: G, M, P',
        text: `G is a goroutine — user code + stack. M is an OS thread — what the kernel actually schedules. P is a logical processor — holds a local run queue and connects G to M. Only a G running on a P attached to an M executes code.`
      },
      {
        label: 'Work stealing',
        text: `When a P's local queue is empty, it steals half the goroutines from another P's local queue before pulling from the global run queue. This keeps all CPUs busy without a central bottleneck.`
      }
    ],
    code: `<span class="cm">// runtime/proc.go (simplified)</span>

<span class="kw">type</span> <span class="type">g</span> <span class="kw">struct</span> {
    stack    <span class="type">stack</span>     <span class="cm">// goroutine stack bounds</span>
    sched    <span class="type">gobuf</span>     <span class="cm">// saved registers (PC, SP, …)</span>
    atomicstatus <span class="type">uint32</span>  <span class="cm">// _Grunnable, _Grunning, …</span>
}

<span class="kw">type</span> <span class="type">p</span> <span class="kw">struct</span> {
    runqhead, runqtail <span class="type">uint32</span>
    runq    [<span class="num">256</span>]<span class="type">guintptr</span> <span class="cm">// local circular queue</span>
    runnext <span class="type">guintptr</span>       <span class="cm">// next G to run (fast path)</span>
}

<span class="cm">// schedule() is the heart of the scheduler</span>
<span class="kw">func</span> <span class="fn">schedule</span>() {
    gp := <span class="fn">runqget</span>(pp)          <span class="cm">// local queue</span>
    <span class="kw">if</span> gp == <span class="kw">nil</span> {
        gp = <span class="fn">findrunnable</span>()    <span class="cm">// steal / global queue</span>
    }
    <span class="fn">execute</span>(gp)                <span class="cm">// run it</span>
}`,
    vizTitle: 'GMP Scheduler — Spawn goroutines and watch scheduling',
    vizHTML: () => `
      <div class="viz-controls">
        <button class="viz-btn" id="gmp-spawn">+ Spawn G</button>
        <button class="viz-btn secondary" id="gmp-block">⊘ Block Running G</button>
        <button class="viz-btn secondary" id="gmp-steal">⇄ Work Steal</button>
        <button class="viz-btn secondary" id="gmp-reset">↺ Reset</button>
      </div>
      <div class="gmp-wrap">
        <div class="gmp-row">
          <div class="gmp-label">GRQ</div>
          <div class="grq-box" id="grq"><span style="color:var(--muted);font-size:11px">empty</span></div>
        </div>
        <div class="gmp-row">
          <div class="gmp-label">P</div>
          <div class="gmp-boxes" id="p-boxes"></div>
        </div>
        <div class="gmp-row">
          <div class="gmp-label">M</div>
          <div class="gmp-boxes" id="m-boxes"></div>
        </div>
      </div>
      <div class="gmp-log" id="gmp-log"><div><span class="log-time">[ready]</span> Scheduler initialised with 2 Ps</div></div>`,
    vizInit: () => {
      let gSeq = 0;
      // State: p0Running, p0Queue[], p1Running, p1Queue[], grq[]
      const state = {
        grq: [],
        p: [{ running: null, queue: [] }, { running: null, queue: [] }]
      };

      function log(msg) {
        const el = document.getElementById('gmp-log');
        const t = new Date().toLocaleTimeString('en', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        el.innerHTML += `<div><span class="log-time">[${t}]</span> ${msg}</div>`;
        el.scrollTop = el.scrollHeight;
      }

      function gPill(name, state) {
        return `<span class="g-pill ${state}">${name}</span>`;
      }

      function render() {
        // GRQ
        const grqEl = document.getElementById('grq');
        grqEl.innerHTML = state.grq.length
          ? state.grq.map(g => gPill(g, 'waiting')).join(' ')
          : '<span style="color:var(--muted);font-size:11px">empty</span>';

        // Ps
        const pEl = document.getElementById('p-boxes');
        pEl.innerHTML = state.p.map((p, i) => `
          <div class="p-box">
            <div class="p-box-title">P${i}</div>
            <div class="p-running">${p.running ? gPill(p.running, 'run') : '<span style="color:var(--muted);font-size:10px">idle</span>'}</div>
            <div class="p-queue">${p.queue.map(g => gPill(g, 'waiting')).join('')}</div>
          </div>`).join('');

        // Ms
        const mEl = document.getElementById('m-boxes');
        mEl.innerHTML = state.p.map((p, i) =>
          `<div class="m-box">M${i}<br><span style="font-size:9px;color:var(--muted)">${p.running ? 'running' : 'idle'}</span></div>`
        ).join('');
      }

      function schedule() {
        // For each P with no running G, pull from local queue, then GRQ
        state.p.forEach((p, i) => {
          if (!p.running) {
            if (p.queue.length) {
              p.running = p.queue.shift();
              log(`P${i} picked up ${p.running} from local queue`);
            } else if (state.grq.length) {
              p.running = state.grq.shift();
              log(`P${i} picked up ${p.running} from GRQ`);
            }
          }
        });
        render();
      }

      document.getElementById('gmp-spawn').addEventListener('click', () => {
        const name = `G${++gSeq}`;
        // Find P with shortest local queue
        const best = state.p[0].queue.length <= state.p[1].queue.length ? 0 : 1;
        if (!state.p[best].running) {
          state.p[best].running = name;
          log(`Spawned ${name} → running on P${best} immediately`);
        } else if (state.p[best].queue.length < 4) {
          state.p[best].queue.push(name);
          log(`Spawned ${name} → queued in P${best} local queue`);
        } else {
          state.grq.push(name);
          log(`Spawned ${name} → local queues full, placed in GRQ`);
        }
        schedule();
      });

      document.getElementById('gmp-block').addEventListener('click', () => {
        const p = state.p.find(p => p.running);
        if (!p) { log('No running goroutines to block'); return; }
        const name = p.running;
        p.running = null;
        log(`${name} blocked (e.g. syscall) → M parked, P free to run`);
        schedule();
      });

      document.getElementById('gmp-steal').addEventListener('click', () => {
        const p0 = state.p[0], p1 = state.p[1];
        const donor = p0.queue.length > p1.queue.length ? p0 : p1;
        const thief = donor === p0 ? p1 : p0;
        const donorIdx = donor === p0 ? 0 : 1;
        const thiefIdx = thief === p0 ? 0 : 1;
        if (donor.queue.length < 1) { log('Nothing to steal — queues are balanced'); return; }
        const half = Math.ceil(donor.queue.length / 2);
        const stolen = donor.queue.splice(0, half);
        thief.queue.push(...stolen);
        log(`Work steal: P${thiefIdx} stole [${stolen.join(', ')}] from P${donorIdx}`);
        schedule();
      });

      document.getElementById('gmp-reset').addEventListener('click', () => {
        gSeq = 0;
        state.grq = [];
        state.p = [{ running: null, queue: [] }, { running: null, queue: [] }];
        document.getElementById('gmp-log').innerHTML = '<div><span class="log-time">[reset]</span> Scheduler reset</div>';
        render();
      });

      render();
      return () => {};
    }
  },

    body: [
      {
        label: 'Three-tier design',
        text: `Small allocations (<32 KB) go through mcache (per-P, lock-free), then mcentral (per size-class, one lock), then mheap (global, one lock). Large allocations (≥32 KB) skip straight to mheap. The tiers act as a cache hierarchy.`
      },
      {
        label: 'Size classes',
        text: `Go defines 67 size classes (8 B, 16 B, 24 B … 32 KB). Each object is rounded up to the nearest class and allocated from a span of that class. This reduces fragmentation without per-object headers.`
      }
    ],
    code: `<span class="cm">// runtime/malloc.go</span>
<span class="kw">func</span> <span class="fn">mallocgc</span>(size <span class="type">uintptr</span>, typ <span class="type">*_type</span>, needzero <span class="type">bool</span>) <span class="type">unsafe.Pointer</span> {
    <span class="kw">if</span> size <= <span class="fn">maxSmallSize</span> {        <span class="cm">// ≤ 32 KB</span>
        <span class="kw">if</span> size < <span class="fn">maxTinySize</span> {      <span class="cm">// &lt; 16 B: tiny allocator</span>
            <span class="kw">return</span> <span class="fn">tinyAlloc</span>(size)
        }
        <span class="cm">// Look up size class, use mcache span</span>
        spc := <span class="fn">makeSpanClass</span>(size, noscan)
        span := c.alloc[spc]          <span class="cm">// c = current P's mcache</span>
        v := <span class="fn">nextFreeFast</span>(span)
        <span class="kw">if</span> v == <span class="num">0</span> {
            v = <span class="fn">nextFree</span>(spc)        <span class="cm">// refill from mcentral</span>
        }
        <span class="kw">return</span> <span class="type">unsafe.Pointer</span>(v)
    }
    <span class="kw">return</span> <span class="fn">largeAlloc</span>(size)        <span class="cm">// direct from mheap</span>
}`,

        </div>
        <button class="viz-btn" id="alloc-btn">Allocate</button>
        <button class="viz-btn secondary" id="alloc-reset">↺ Reset</button>
      </div>
      <div class="mem-alloc" id="mem-alloc">
        <div class="alloc-tier mcache" id="tier-mcache">
          <div class="tier-header">
            <span class="tier-name">mcache (per-P, lock-free)</span>
            <span class="tier-desc">tiny &amp; small objects</span>
          </div>
          <div class="tier-slots" id="mcache-slots"></div>
        </div>
        <div class="alloc-arrow">↓</div>
        <div class="alloc-tier mcentral" id="tier-mcentral">
          <div class="tier-header">
            <span class="tier-name">mcentral (per size-class)</span>
            <span class="tier-desc">spans of same size class</span>
          </div>
          <div class="tier-slots" id="mcentral-slots"></div>
        </div>
        <div class="alloc-arrow">↓</div>
        <div class="alloc-tier mheap" id="tier-mheap">
          <div class="tier-header">
            <span class="tier-name">mheap (global)</span>
            <span class="tier-desc">large objects ≥ 32 KB</span>
          </div>
          <div class="tier-slots" id="mheap-slots"></div>
        </div>
      </div>
      <div class="alloc-status" id="alloc-status"></div>`,
    vizInit: () => {
      const slots = { mcache: Array(24).fill(false), mcentral: Array(16).fill(false), mheap: Array(10).fill(false) };
      let selectedSize = 8;

      function renderSlots(name) {
        const el = document.getElementById(`${name}-slots`);
        el.innerHTML = slots[name].map((used, i) =>
          `<div class="tier-slot ${used ? 'used' : ''}" title="slot ${i}"></div>`
        ).join('');
      }

      function renderAll() {
        renderSlots('mcache'); renderSlots('mcentral'); renderSlots('mheap');
      }

      function highlight(tier, on) {
        const el = document.getElementById(`tier-${tier}`);
        if (on) el.classList.add('highlight');
        else el.classList.remove('highlight');
      }

      function setStatus(msg) {
        document.getElementById('alloc-status').textContent = msg;
      }

      function allocateIn(tierName) {
        const s = slots[tierName];
        const idx = s.indexOf(false);
        if (idx === -1) return false;
        s[idx] = true;
        return true;
      }

      function animate(steps, cb) {
        let i = 0;
        function next() {
          if (i > 0) highlight(steps[i-1].tier, false);
          if (i >= steps.length) { if (cb) cb(); return; }
          const s = steps[i++];
          highlight(s.tier, true);
          setStatus(s.msg);
          renderAll();
          setTimeout(next, s.delay || 600);
        }
        next();
      }

      document.querySelectorAll('.size-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          selectedSize = parseInt(this.dataset.size);
        });
      });

      document.getElementById('alloc-btn').addEventListener('click', () => {
        const sz = selectedSize;
        if (sz >= 32768) {
          // large: go straight to mheap
          animate([
            { tier: 'mheap', msg: `${sz >= 1024 ? (sz/1024)+'KB' : sz+'B'} ≥ 32 KB → large alloc, skipping to mheap…`, delay: 800 }
          ], () => {
            allocateIn('mheap');
            setStatus(`✓ Allocated directly from mheap`);
            highlight('mheap', false);
            renderAll();
          });
        } else {
          // small: try mcache, then mcentral
          const inMcache = slots.mcache.indexOf(false) !== -1;
          if (inMcache) {
            animate([
              { tier: 'mcache', msg: `Checking mcache for size class ${sz}B… hit!`, delay: 700 }
            ], () => {
              allocateIn('mcache');
              setStatus(`✓ Fast path: allocated from mcache (lock-free)`);
              highlight('mcache', false);
              renderAll();
            });
          } else {
            const inMcentral = slots.mcentral.indexOf(false) !== -1;
            animate([
              { tier: 'mcache', msg: `Checking mcache… miss (no free span)`, delay: 600 },
              { tier: 'mcentral', msg: `Fetching new span from mcentral…`, delay: 700 }
            ], () => {
              if (inMcentral) {
                allocateIn('mcentral');
                setStatus(`✓ Refilled mcache from mcentral`);
              } else {
                allocateIn('mheap');
                setStatus(`✓ mcentral empty — allocated new span from mheap`);
              }
              highlight('mcentral', false);
              renderAll();
            });
          }
        }
      });

      document.getElementById('alloc-reset').addEventListener('click', () => {
        slots.mcache.fill(false); slots.mcentral.fill(false); slots.mheap.fill(false);
        setStatus('');
        ['mcache','mcentral','mheap'].forEach(t => highlight(t, false));
        renderAll();
      });

      renderAll();
      return () => {};
    }
  },

  // ── 6–20: stubs ──────────────────────────────
  ...[
    [6,  'Garbage Collector',      'Tri-color mark-and-sweep with write barriers',     'Runtime'],
    [7,  'Stack Management',       'Segmented stacks, stack copying & goroutine stacks','Runtime'],
    [8,  'Interfaces & Types',     'itab, iface, eface and dynamic dispatch',           'Type System'],
    [9,  'Defer, Panic & Recover', 'How the defer stack works and panic unwinding',     'Control Flow'],
    [10, 'Sync Primitives',        'Mutex, RWMutex, WaitGroup, Once internals',         'Concurrency'],
    [11, 'Context & Cancellation', 'Context tree, cancellation propagation',            'Concurrency'],
    [12, 'Reflection',             'reflect.Type, reflect.Value and the type system',   'Type System'],
    [13, 'Maps Internals',         'Hash tables, bucket overflow and evacuation',       'Data Structures'],
    [14, 'Slice Internals',        'Backing array, growth factor and append semantics', 'Data Structures'],
    [15, 'String Internals',       'Immutability, StringHeader and []byte conversion',  'Data Structures'],
    [16, 'HTTP Server',            'net/http server loop, mux and connection lifecycle','Standard Library'],
    [17, 'Go Modules & Build',     'Module graph, MVS algorithm and build cache',       'Toolchain'],
    [18, 'CGo',                    'Crossing the Go/C boundary and its costs',          'Interop'],
    [19, 'Race Detector',          'ThreadSanitizer integration and shadow memory',     'Tools'],
    [20, 'Profiling & pprof',      'CPU, heap, goroutine and trace profiling',          'Tools'],
  ].map(([id, title, subtitle, tag]) => ({
    id, title, subtitle, tag,
    concepts: [], body: [], code: '', vizTitle: '', vizHTML: null, vizInit: null
  }))
];

// ─────────────────────────────────────────────
//  Sidebar
// ─────────────────────────────────────────────
const SECTIONS = {
  1: 'Runtime Core',
  3: 'Concurrency',
  7: 'Type System & Control',
  10: 'Sync & Context',
  12: 'Internals',
  16: 'Standard Library & Toolchain',
};

function buildSidebar() {
  const nav = document.getElementById('chapter-list');
  nav.innerHTML = '';
  CHAPTERS.forEach(ch => {
    if (SECTIONS[ch.id]) {
      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.textContent = SECTIONS[ch.id];
      nav.appendChild(lbl);
    }
    const item = document.createElement('div');
    item.className = 'ch-item' + (visited.has(ch.id) ? ' done' : '') + (ch.id === currentChapter ? ' active' : '');
    item.id = `nav-${ch.id}`;
    item.innerHTML = `
      <div class="ch-num">${visited.has(ch.id) ? '✓' : ch.id}</div>
      <div class="ch-meta">
        <div class="ch-title">${esc(ch.title)}</div>
        <div class="ch-tag">${esc(ch.tag)}</div>
      </div>`;
    item.addEventListener('click', () => navigate(ch.id));
    nav.appendChild(item);
  });
}

function updateProgress() {
  const pct = (visited.size / CHAPTERS.length * 100).toFixed(0);
  document.getElementById('progress').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${visited.size} / ${CHAPTERS.length}`;
}

// ─────────────────────────────────────────────
//  Render chapter
// ─────────────────────────────────────────────
let currentChapter = 1;

function renderChapter(id) {
  const ch = CHAPTERS.find(c => c.id === id);
  if (!ch) return;

  // Cleanup previous viz
  if (currentCleanup) { currentCleanup(); currentCleanup = null; }

  const main = document.getElementById('main');

  if (!ch.vizHTML) {
    // Coming soon
    main.innerHTML = `
      <div class="chapter-view">
        <div class="ch-header">
          <div class="ch-header-top">
            <span class="ch-badge">${esc(ch.tag)}</span>
            <span class="ch-number">Chapter ${ch.id} of ${CHAPTERS.length}</span>
          </div>
          <h1>${esc(ch.title)}</h1>
          <div class="subtitle">${esc(ch.subtitle)}</div>
        </div>
        <div class="coming-soon">
          <div class="cs-icon">🚧</div>
          <h3>Coming Soon</h3>
          <p>This chapter is under construction. Check back soon!</p>
        </div>
        ${navHTML(id)}
      </div>`;
    return;
  }

  const bodyCards = ch.body.map(b => `
    <div class="card">
      <div class="card-label">${esc(b.label)}</div>
      <p>${b.text}</p>
    </div>`).join('');

  main.innerHTML = `
    <div class="chapter-view">
      <div class="ch-header">
        <div class="ch-header-top">
          <span class="ch-badge">${esc(ch.tag)}</span>
          <span class="ch-number">Chapter ${ch.id} of ${CHAPTERS.length}</span>
        </div>
        <h1>${esc(ch.title)}</h1>
        <div class="subtitle">${esc(ch.subtitle)}</div>
      </div>

      ${ch.concepts.length ? `<div class="concepts">${ch.concepts.map(c => `<span class="concept">${esc(c)}</span>`).join('')}</div>` : ''}

      <div class="content-grid">${bodyCards}</div>

      ${ch.code ? `
        <div class="code-wrap">
          <div class="code-header">
            <span class="code-lang">Go</span>
            <button class="copy-btn" onclick="copyCode(this)">Copy</button>
          </div>
          <pre>${ch.code}</pre>
        </div>` : ''}

      ${ch.vizHTML ? `
        <div class="viz-card">
          <div class="viz-header"><span class="viz-title">▣ ${esc(ch.vizTitle)}</span></div>
          <div class="viz-body">${ch.vizHTML()}</div>
        </div>` : ''}

      ${navHTML(id)}
    </div>`;

  if (ch.vizInit) {
    currentCleanup = ch.vizInit() || null;
  }
}

function navHTML(id) {
  const prev = id > 1, next = id < CHAPTERS.length;
  const prevCh = CHAPTERS.find(c => c.id === id - 1);
  const nextCh = CHAPTERS.find(c => c.id === id + 1);
  return `
    <div class="ch-nav">
      <button class="nav-btn" onclick="navigate(${id-1})" ${!prev ? 'disabled' : ''}>
        ← ${prev ? esc(prevCh.title) : 'Start'}
      </button>
      <span class="nav-center">${id} / ${CHAPTERS.length}</span>
      <button class="nav-btn" onclick="navigate(${id+1})" ${!next ? 'disabled' : ''}>
        ${next ? esc(nextCh.title) : 'End'} →
      </button>
    </div>`;
}

// ─────────────────────────────────────────────
//  Navigation
// ─────────────────────────────────────────────
function navigate(id) {
  const ch = CHAPTERS.find(c => c.id === id);
  if (!ch) return;
  visited.add(currentChapter);
  currentChapter = id;
  document.querySelectorAll('.ch-item').forEach(el => el.classList.remove('active'));
  buildSidebar();
  updateProgress();
  renderChapter(id);
  document.getElementById('main').scrollTop = 0;
  // Scroll sidebar item into view
  const navItem = document.getElementById(`nav-${id}`);
  if (navItem) navItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// ─────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────
buildSidebar();
updateProgress();
renderChapter(1);
</script>
</body>
</html>
